name: Build BaseballManager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore solution
        run: dotnet restore BaseballManager.sln

      - name: Build solution
        run: dotnet build BaseballManager.sln --configuration Release --no-restore
