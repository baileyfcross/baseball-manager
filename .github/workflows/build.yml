name: Build BaseballManager

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore local .NET tools
        run: dotnet tool restore

      - name: Install native dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype6

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install freetype

      - name: Configure freetype alias (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/lib"
          FREETYPE_LIB="$(ldconfig -p | awk '/libfreetype\.so\.6/{print $NF; exit}')"
          if [[ -z "$FREETYPE_LIB" ]]; then
            echo "Could not locate libfreetype.so.6"
            exit 1
          fi
          ln -sf "$FREETYPE_LIB" "$HOME/.local/lib/libfreetype6"
          ln -sf "$FREETYPE_LIB" "$HOME/.local/lib/libfreetype6.so"
          ls -la "$HOME/.local/lib"

      - name: Configure freetype alias (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/lib"
          FREETYPE_LIB="$(brew --prefix freetype)/lib/libfreetype.6.dylib"
          if [[ ! -f "$FREETYPE_LIB" ]]; then
            echo "Could not locate $FREETYPE_LIB"
            exit 1
          fi
          ln -sf "$FREETYPE_LIB" "$HOME/.local/lib/libfreetype6"
          ln -sf "$FREETYPE_LIB" "$HOME/.local/lib/libfreetype6.dylib"
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "$FREETYPE_LIB" /usr/local/lib/libfreetype6.dylib
          ls -la "$HOME/.local/lib"
          ls -la /usr/local/lib/libfreetype6.dylib

      - name: Prepare spritefont files (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf src/BaseballManager.Game/Assets/Fonts/UiSans.ttf
          cp /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf src/BaseballManager.Game/Assets/Fonts/UiMono.ttf
          ls -la src/BaseballManager.Game/Assets/Fonts

      - name: Prepare spritefont files (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          SANS_FONT="$(find /System/Library/Fonts /Library/Fonts -type f -iname 'Arial.ttf' | head -n 1)"
          MONO_FONT="$(find /System/Library/Fonts /Library/Fonts -type f -iname 'Courier New.ttf' | head -n 1)"
          if [[ -z "$SANS_FONT" ]]; then
            echo "Could not locate Arial.ttf on macOS runner"
            exit 1
          fi
          if [[ -z "$MONO_FONT" ]]; then
            echo "Could not locate Courier New.ttf on macOS runner"
            exit 1
          fi
          cp "$SANS_FONT" src/BaseballManager.Game/Assets/Fonts/UiSans.ttf
          cp "$MONO_FONT" src/BaseballManager.Game/Assets/Fonts/UiMono.ttf
          ls -la src/BaseballManager.Game/Assets/Fonts

      - name: Prepare spritefont files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item -Path "$env:WINDIR\Fonts\arial.ttf" -Destination "src/BaseballManager.Game/Assets/Fonts/UiSans.ttf" -Force
          if (Test-Path "$env:WINDIR\Fonts\cour.ttf") {
            Copy-Item -Path "$env:WINDIR\Fonts\cour.ttf" -Destination "src/BaseballManager.Game/Assets/Fonts/UiMono.ttf" -Force
          } else {
            Copy-Item -Path "$env:WINDIR\Fonts\consola.ttf" -Destination "src/BaseballManager.Game/Assets/Fonts/UiMono.ttf" -Force
          }
          Get-ChildItem src/BaseballManager.Game/Assets/Fonts | Format-Table Name, Length -AutoSize

      - name: Restore solution
        run: dotnet restore BaseballManager.sln

      - name: Build solution
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            export LD_LIBRARY_PATH="$HOME/.local/lib:${LD_LIBRARY_PATH:-}"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            export DYLD_LIBRARY_PATH="$HOME/.local/lib:$(brew --prefix freetype)/lib:${DYLD_LIBRARY_PATH:-}"
          fi
          dotnet build BaseballManager.sln --configuration Release --no-restore
